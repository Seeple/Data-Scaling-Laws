compute_environment: LOCAL_MACHINE
# Use MULTI_GPU to enable multi-GPU training via Accelerate.
distributed_type: MULTI_GPU
downcast_bf16: false
machine_rank: 0
main_training_function: main
mixed_precision: "no"
num_machines: 1
# Default to 1 process; override via NUM_PROCESSES env in scripts if needed.
num_processes: 1
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
