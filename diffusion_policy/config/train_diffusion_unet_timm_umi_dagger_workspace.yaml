defaults:
  - task: umi
  - _self_

name: train_diffusion_unet_timm_dagger
_target_: diffusion_policy.workspace.train_diffusion_unet_image_dagger_workspace.TrainDiffusionUnetImageDaggerWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "dagger"

training_enable_fp32_fallback: True

n_action_steps: 8

policy:
  _target_: diffusion_policy.policy.diffusion_unet_timm_policy.DiffusionUnetTimmPolicy

  shape_meta: ${shape_meta}
  
  noise_scheduler:
    _target_: diffusers.DDIMScheduler
    num_train_timesteps: 50
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: epsilon

  obs_encoder:
    _target_: diffusion_policy.model.vision.timm_obs_encoder.TimmObsEncoder
    shape_meta: ${shape_meta}
    model_name: 'vit_base_patch16_clip_224.openai'
    pretrained: True
    frozen: False
    use_lora: False
    lora_rank: 8
    drop_path_rate: 0.0
    global_pool: ''
    feature_aggregation: 'cls_token'
    position_encording: 'sinusoidal'
    downsample_ratio: 32
    transforms:
      - type: RandomCrop
        ratio: 0.95
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.3
        contrast: 0.4
        saturation: 0.5
        hue: 0.08
    use_group_norm: True
    share_rgb_model: False
    imagenet_norm: True
    three_augment: False
    fused_model_name: ''

  num_inference_steps: 16
  obs_as_global_cond: True
  diffusion_step_embed_dim: 128
  down_dims: [256,512,1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True
  input_pertub: 0.1
  train_diffusion_n_samples: 1

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: True

val_dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: True

optimizer:
  _target_: torch.optim.AdamW
  lr: 3.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6
  encoder_weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: False
  finetune_from: null
  reset_steps_on_finetune: True
  freeze_encoder_on_finetune: False
  freeze_encoder_epochs: 0
  enable_fp32_fallback: True
  lr_scheduler: cosine
  lr_warmup_steps: 2000
  num_epochs: 120
  gradient_accumulate_every: 1
  layer_decay: 1.0
  use_ema: True
  freeze_encoder: False
  rollout_every: 10
  checkpoint_every: 10
  val_every: 1
  sample_every: 5
  wild_sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  encoder_lr_coefficient: 0.1
  use_in_the_wild_val: False
  in_the_wild_type: ["seen_object-unseen_env", "unseen_object-seen_env", "unseen_object-unseen_env"]

logging:
  project: umi
  resume: False
  mode: online
  use_wandb: True
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: val_mixed_action_mse_error
    mode: min
    k: 5
    format_str: 'epoch={epoch:04d}-val_mixed_action_mse_error={val_mixed_action_mse_error:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False
  only_save_recent: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

# Task overrides for DAgger mixing
task:
  teleop_dataset_path: ${oc.env:TELEOP_DATASET_PATH,${task.dataset_path}}
  hitl_dataset_path: ${oc.env:HITL_DATASET_PATH,${task.dataset_path}}
  dataset:
    _target_: diffusion_policy.dataset.umi_dagger_dataset.DaggerMixedUmiDataset
    shape_meta: ${task.shape_meta}
    teleop_dataset_path: ${task.teleop_dataset_path}
    hitl_dataset_path: ${task.hitl_dataset_path}
    hitl_prob: 0.5
    cache_dir: null
    pose_repr: ${task.pose_repr}
    action_padding: False
    temporally_independent_normalization: False
    repeat_frame_prob: 0.0
    max_duration: null
    seed: 42
    val_ratio: 0.1
    use_ratio: 1.0
    dataset_idx: null
    normalizer_num_workers: 0

# DAgger dataset configuration
# teleop_dataset_path and hitl_dataset_path should be overridden from launch script
# hitl_prob = probability of sampling from HITL per sample
# val_ratio controls the split inside each dataset
# use_ratio lets you downsample both datasets identically

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
